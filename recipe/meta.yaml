{% set name = "ptplot" %}
{% set version = "0.3.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ptplot-{{ version }}.tar.gz
  sha256: 4d23b74bae59a217e37001fbcb3ef9a99b640e5c8dce504847f82697e46c149a

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - bokeh >=2.3.3,<3
    - nodejs >=14.17.0,<15
    - numpy >=1.19.5,<2
    - pandas >=1.2.0,<2
    - patsy >=0.5.1,<0.6.0
    - python >={{ python_min }}
    - svgpathtools >=1.4.1,<2

test:
  imports:
   - ptplot
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/AndrewRook/ptplot
  summary: Make beautiful plots of player tracking data
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - AndrewRook
